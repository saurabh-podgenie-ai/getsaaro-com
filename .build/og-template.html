<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background:
      radial-gradient(1100px 700px at 18% 40%, #1a1746 0%, rgba(26,23,70,0) 60%),
      #0b0a23;
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 0 96px;
    overflow: hidden;
  }

  /* ---- App icon (squircle, no white tile) ---- */
  .icon {
    flex: 0 0 auto;
    width: 300px;
    height: 300px;
    border-radius: 68px;               /* iOS-style rounded square */
    background: linear-gradient(155deg, #211c54 0%, #16123a 55%, #120f30 100%);
    position: relative;
    box-shadow:
      0 30px 70px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 0 0 1px rgba(124,92,255,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon svg { width: 300px; height: 300px; display: block; }

  /* ---- Divider ---- */
  .divider {
    flex: 0 0 auto;
    width: 1px;
    height: 360px;
    background: linear-gradient(180deg, rgba(124,92,255,0) 0%, rgba(124,92,255,0.55) 50%, rgba(124,92,255,0) 100%);
  }

  /* ---- Text ---- */
  .copy { flex: 1 1 auto; }
  .eyebrow {
    color: #8f79ff;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 0.2px;
    margin-bottom: 20px;
  }
  .headline {
    color: #ffffff;
    font-size: 78px;
    line-height: 1.04;
    font-weight: 700;
    letter-spacing: -1.5px;
    margin-bottom: 28px;
  }
  .sub {
    color: #9b99c4;
    font-size: 27px;
    line-height: 1.4;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="drop" x1="150" y1="40" x2="150" y2="250" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#5b34c9"/>
          <stop offset="1" stop-color="#3a1d8a"/>
        </linearGradient>
        <radialGradient id="core" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
          gradientTransform="translate(150 190) scale(58)">
          <stop offset="0" stop-color="#ffffff"/>
          <stop offset="0.18" stop-color="#cdb8ff"/>
          <stop offset="0.45" stop-color="#7c5cff"/>
          <stop offset="0.75" stop-color="#3f2a93"/>
          <stop offset="1" stop-color="#3f2a93" stop-opacity="0"/>
        </radialGradient>
      </defs>

      <!-- teardrop: pointed at top, round at bottom -->
      <path d="M150 52
               C150 52 214 150 214 192
               A64 64 0 1 1 86 192
               C86 150 150 52 150 52 Z"
            fill="url(#drop)"/>

      <!-- sound ripples -->
      <circle cx="150" cy="190" r="46" stroke="#9c7bff" stroke-opacity="0.30" stroke-width="3" fill="none"/>
      <circle cx="150" cy="190" r="30" stroke="#b49bff" stroke-opacity="0.55" stroke-width="3" fill="none"/>

      <!-- glowing core -->
      <circle cx="150" cy="190" r="58" fill="url(#core)"/>
      <circle cx="150" cy="190" r="11" fill="#ffffff"/>
    </svg>
  </div>

  <div class="divider"></div>

  <div class="copy">
    <div class="eyebrow">Saaro</div>
    <div class="headline">Make every<br>podcast yours.</div>
    <div class="sub">Chapter-level control. Now in private beta on iOS.</div>
  </div>
</body>
</html>
